name: 'Terraform Plan / Apply'

on: 
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - components/**
      - modules/**
  schedule:
    - cron: 10 19 * * *

enable-email-notifications: true

jobs:
  terraform:
    defaults:
      run:
        shell: bash
        working-directory: ./components/compute
    runs-on: [ forgejo ]
    container:
      image: ghcr.io/eannaoceallaigh/ubuntu-2204-actions

    name: 'Terraform Plan / Apply'

    steps:
    # Checkout the repository to the GitHub Actions runner
    - uses: actions/checkout@v6

    - name: Authenticate to Google Cloud via JSON
      uses: https://github.com/google-github-actions/auth@v3
      with:
        credentials_json: ${{ secrets.GOOGLE_CREDS }}

    # Install the preferred version of Terraform CLI 
    - name: Setup Terraform
      uses: https://github.com/hashicorp/setup-terraform@v3
      with:
        terraform_version: 1.11.4

    # Format terraform
    - name: Terraform fmt
      id: fmt
      run: terraform fmt -check

    # Initialize a new or existing Terraform working directory by creating initial files, loading any remote state, downloading modules, etc.
    - name: Terraform Init
      id: init
      env:
        PROJECT_ID: ${{ secrets.PROJECT_ID }}
        BUCKET: ${{ secrets.BUCKET }}
      run: terraform init --var project_id=$PROJECT_ID -backend-config="bucket=$BUCKET" -backend-config="prefix=terraform-state/compute.terraform.tfstate"

    # Validate terraform
    - name: Terraform Validate
      id: validate
      run: terraform validate -no-color

    - name: Terraform Plan
      id: plan
      env:
        PROJECT_ID: ${{ secrets.PROJECT_ID }}
        CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        DOMAIN: ${{ secrets.DOMAIN }}
      run: terraform plan -no-color -var=project_id=$PROJECT_ID -var=cloudflare_api_token=$CLOUDFLARE_API_TOKEN -var=domain=$DOMAIN --lock=false
    
    # - name: Terraform Apply
    #   id: apply
    #   env:
    #     PROJECT_ID: ${{ secrets.PROJECT_ID }}
    #     CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    #   run: terraform apply -var=project_id=$PROJECT_ID -var=cloudflare_api_token=$CLOUDFLARE_API_TOKEN --auto-approve
